{% extends "base.html" %}

{% block content %}
  <section class="two-column">
    <article class="panel card-glow">
      <div class="panel-header">
        <p class="eyebrow">Portal 1</p>
        <h2>Staff Login</h2>
        <p>Two-layer protection for all staff roles.</p>
      </div>
      <form method="post" action="{{ url_for('staff_login') }}" class="form-grid">
        <select name="role" required>
          <option value="">Choose role</option>
          <option>Admin</option>
          <option>Doctor</option>
          <option>Nurse</option>
          <option>Staff</option>
          <option>Pharmacy</option>
          <option>IoT</option>
        </select>
        <input type="text" name="login_id" placeholder="Login ID" required />
        <input type="password" name="layer_one" placeholder="Password" required />
        <input type="text" name="layer_two" placeholder="BioThumb ID" required />
        <button type="submit">Open secure portal</button>
      </form>
    </article>

    <article class="panel">
      <div class="panel-header">
        <p class="eyebrow">Portal 2</p>
        <h2>Patient Registration</h2>
        <p>Self-registration or emergency entry by admin / receptionist.</p>
      </div>
      <form method="post" action="{{ url_for('patient_register') }}" class="form-grid">
        <input type="text" name="full_name" placeholder="Patient name" required />
        <input type="number" name="age" placeholder="Age" required />
        <select name="gender" required>
          <option value="">Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
        <input type="text" name="phone" placeholder="Phone number" required />
        <input type="text" name="condition" placeholder="Condition / issue" required />
        <input type="text" name="ward" placeholder="Ward / room" required />
        <select name="admission_type" required>
          <option value="">Admission type</option>
          <option>Outpatient</option>
          <option>Inpatient</option>
          <option>Emergency</option>
        </select>
        <select name="registered_by" required>
          <option value="">Registered by</option>
          <option>Self</option>
          <option>Admin</option>
          <option>Receptionist</option>
        </select>
        <input type="date" name="admitted_on" required />
        <select name="emergency_case" required>
          <option value="no">Normal case</option>
          <option value="yes">Emergency case</option>
        </select>
        <button type="submit">Register patient</button>
      </form>
    </article>
  </section>
{% endblock %}
